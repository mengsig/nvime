name: test

on:
  push:
  pull_request:

jobs:
  test:
    name: tests (${{ matrix.os }}, ${{ matrix.neovim }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        neovim: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}
      - run: nvim --version
      - run: ./scripts/test

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      # Pinned: stylua's wrapping/quote rules change between releases, so an
      # unpinned `cargo install stylua` can flag a tree formatted by a different
      # version. The tree is formatted with exactly this version.
      - run: cargo install stylua --version 0.20.0 --locked
      - run: sudo apt-get update && sudo apt-get install -y lua5.1 luarocks
      - run: sudo luarocks --lua-version=5.1 install luacheck
      - run: stylua --check lua/ plugin/ tests/
      - run: eval "$(luarocks --lua-version=5.1 path --bin)" && luacheck lua plugin tests
