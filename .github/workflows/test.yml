name: test

on:
  push:
  pull_request:

jobs:
  test:
    name: tests (${{ matrix.os }}, ${{ matrix.neovim }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        neovim: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}
      - run: nvim --version
      - run: ./scripts/test

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo install stylua --locked
      - run: sudo apt-get update && sudo apt-get install -y lua5.1 luarocks
      - run: sudo luarocks --lua-version=5.1 install luacheck
      - run: stylua --check lua/nvime/audit.lua lua/nvime/diff.lua lua/nvime/init.lua lua/nvime/policy.lua lua/nvime/ui.lua plugin/nvime.lua
      - run: eval "$(luarocks --lua-version=5.1 path --bin)" && luacheck lua plugin tests
